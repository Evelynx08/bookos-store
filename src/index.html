<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<title>Bookos Store</title>
<script src="locales.js"></script>
<script src="i18n.js"></script>
</head>
<body data-i18n-title="app.title">
<div class="main-container windowed" id="mc">
  <div class="titlebar" data-tauri-drag-region>
    <div class="tb-left" data-tauri-drag-region>
      <span class="tb-title" data-i18n="app.title">Bookos Store</span>
    </div>
    <div class="tb-center" data-tauri-drag-region>
      <input type="search" class="search-input" id="search" data-i18n-ph="search.ph" placeholder="Buscar apps…" spellcheck="false">
    </div>
    <div class="tb-right">
      <button id="update-all-btn" class="tb-update-btn hidden" data-i18n-title="updateAll" title="Actualizar todas">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 3v6h-6"/></svg>
        <span id="update-all-count">0</span>
      </button>
      <button id="refresh-btn" class="tb-icon-btn" data-i18n-title="refresh" title="Actualizar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/></svg>
      </button>
      <button id="lang-btn" class="tb-icon-btn" data-i18n-title="lang.change" title="Idioma">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3a14 14 0 0 1 0 18"/><path d="M12 3a14 14 0 0 0 0 18"/></svg>
      </button>
      <button id="theme-btn" class="tb-icon-btn" data-i18n-title="theme" title="Tema">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      </button>
      <div class="controls">
        <button id="minimize" data-i18n-title="wm.minimize" title="Minimizar">─</button>
        <button id="maximize" data-i18n-title="wm.maximize" title="Maximizar">☐</button>
        <button id="close" data-i18n-title="wm.close" title="Cerrar">✕</button>
      </div>
    </div>
  </div>

  <div class="categories" id="categories"></div>

  <div class="page-wrap">
    <div id="grid-view">
      <div class="grid" id="apps-grid"></div>
      <div class="empty hidden" id="empty">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span data-i18n="empty">Sin resultados</span>
      </div>
    </div>
    <div id="detail-view" class="hidden"></div>
  </div>
</div>

<!-- Custom root auth dialog -->
<div class="auth-overlay hidden" id="auth-overlay">
  <div class="auth-card" id="auth-card">
    <div class="auth-icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <div class="auth-title" id="auth-title" data-i18n="auth.title">Permisos requeridos</div>
    <div class="auth-desc" id="auth-desc" data-i18n="auth.desc">Introduce la contraseña del equipo.</div>
    <div class="auth-input-wrap">
      <input type="password" id="auth-input" data-i18n-ph="auth.ph" placeholder="Contraseña" spellcheck="false" autocomplete="off">
      <button type="button" class="auth-eye" id="auth-eye" data-i18n-title="auth.eye" title="Mostrar/Ocultar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
    <div class="auth-err hidden" id="auth-err" data-i18n="auth.err">Contraseña incorrecta</div>
    <div class="auth-actions">
      <button class="auth-btn" id="auth-cancel" data-i18n="cancel">Cancelar</button>
      <button class="auth-btn primary" id="auth-ok" data-i18n="auth.ok">Autorizar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="main.js" type="module"></script>
</body>
</html>
