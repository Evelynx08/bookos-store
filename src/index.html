<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<title>Bookos Store</title>
</head>
<body>
<div class="main-container windowed" id="mc">
  <div class="titlebar" data-tauri-drag-region>
    <div class="tb-left" data-tauri-drag-region>
      <span class="tb-title">Bookos Store</span>
    </div>
    <div class="tb-center" data-tauri-drag-region>
      <input type="search" class="search-input" id="search" placeholder="Buscar apps…" spellcheck="false">
    </div>
    <div class="tb-right">
      <button id="refresh-btn" class="tb-icon-btn" title="Actualizar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/></svg>
      </button>
      <button id="theme-btn" class="tb-icon-btn" title="Tema">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      </button>
      <div class="controls">
        <button id="minimize" title="Minimizar">─</button>
        <button id="maximize" title="Maximizar">☐</button>
        <button id="close" title="Cerrar">✕</button>
      </div>
    </div>
  </div>

  <div class="categories" id="categories"></div>

  <div class="page-wrap">
    <div class="grid" id="apps-grid"></div>
    <div class="empty hidden" id="empty">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>Sin resultados</span>
    </div>
  </div>
</div>

<!-- App detail drawer -->
<div class="drawer-overlay hidden" id="drawer">
  <div class="drawer-card" id="drawer-card">
    <button class="drawer-close" id="drawer-close" aria-label="Cerrar">×</button>
    <div class="drawer-header">
      <div class="drawer-icon" id="d-icon"></div>
      <div class="drawer-meta">
        <div class="drawer-title" id="d-title">App</div>
        <div class="drawer-pkg" id="d-pkg">paquete</div>
        <div class="drawer-version" id="d-version"></div>
      </div>
    </div>
    <p class="drawer-desc" id="d-desc"></p>
    <div class="drawer-actions" id="d-actions"></div>
    <div class="drawer-progress hidden" id="d-progress">
      <div class="drawer-progress-bar"><div class="drawer-progress-fill" id="d-progress-fill"></div></div>
      <div class="drawer-progress-text" id="d-progress-text">Descargando…</div>
    </div>
    <div class="drawer-footer">
      <a class="drawer-link" id="d-repo" target="_blank">Ver en GitHub</a>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="main.js" type="module"></script>
</body>
</html>
